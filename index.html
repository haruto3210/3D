<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden;">
<canvas id="game"></canvas>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js";

// =========================
// 基本セットアップ
// =========================
const renderer = new THREE.WebGLRenderer({
  canvas: document.getElementById("game")
});
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// FPSカメラ
const camera = new THREE.PerspectiveCamera(
  75, window.innerWidth / window.innerHeight, 0.1, 1000
);
camera.position.set(0, 2, 0);

// =========================
// ライト
// =========================
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10, 20, 10);
scene.add(sun);

// =========================
// ブロック生成
// =========================
function createBlock(x, y, z, color = 0x55aa55) {
  const geo = new THREE.BoxGeometry(1, 1, 1);
  const mat = new THREE.MeshStandardMaterial({ color });
  const block = new THREE.Mesh(geo, mat);
  block.position.set(x, y, z);
  block.castShadow = true;
  block.receiveShadow = true;
  scene.add(block);
  return block;
}

// =========================
// 地面（20×20）
// =========================
for (let x = -10; x < 10; x++) {
  for (let z = -10; z < 10; z++) {
    createBlock(x, 0, z, 0x55aa55);
  }
}

// =========================
// FPS視点（PointerLock）
// =========================
document.body.addEventListener("click", () => {
  document.body.requestPointerLock();
});

let yaw = 0;
let pitch = 0;

document.addEventListener("mousemove", (e) => {
  if (document.pointerLockElement === document.body) {
    yaw -= e.movementX * 0.002;
    pitch -= e.movementY * 0.002;
    pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
  }
});

// =========================
// 移動 & ジャンプ
// =========================
let keys = {};
document.addEventListener("keydown", (e) => keys[e.key] = true);
document.addEventListener("keyup", (e) => keys[e.key] = false);

let velocityY = 0;
const gravity = -0.01;
let onGround = false;

// =========================
// ブロック破壊・設置
// =========================
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2(0, 0); // 中央固定

document.addEventListener("mousedown", (e) => {
  if (document.pointerLockElement !== document.body) return;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(scene.children);

  if (hits.length === 0) return;

  const block = hits[0].object;

  if (e.button === 0) {
    // 左クリック → 壊す
    scene.remove(block);
  }

  if (e.button === 2) {
    // 右クリック → 置く
    const p = hits[0].point;
    const n = hits[0].face.normal;

    const x = Math.floor(p.x + n.x);
    const y = Math.floor(p.y + n.y);
    const z = Math.floor(p.z + n.z);

    createBlock(x, y, z, 0xaaaaaa);
  }
});

document.addEventListener("contextmenu", (e) => e.preventDefault());

// =========================
// ゲームループ
// =========================
function animate() {
  requestAnimationFrame(animate);

  // カメラ回転
  camera.rotation.order = "YXZ";
  camera.rotation.y = yaw;
  camera.rotation.x = pitch;

  // 移動
  const speed = 0.1;
  const forward = new THREE.Vector3(
    -Math.sin(yaw),
    0,
    -Math.cos(yaw)
  );
  const right = new THREE.Vector3(
    Math.cos(yaw),
    0,
    -Math.sin(yaw)
  );

  if (keys["w"]) camera.position.addScaledVector(forward, speed);
  if (keys["s"]) camera.position.addScaledVector(forward, -speed);
  if (keys["a"]) camera.position.addScaledVector(right, -speed);
  if (keys["d"]) camera.position.addScaledVector(right, speed);

  // ジャンプ & 重力
  velocityY += gravity;
  camera.position.y += velocityY;

  if (camera.position.y < 2) {
    camera.position.y = 2;
    velocityY = 0;
    onGround = true;
  }

  if (keys[" "] && onGround) {
    velocityY = 0.2;
    onGround = false;
  }

  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
